<div class="first-container">
  <h1>World Map and Statistics</h1>
  <p>Interactive map showing Income, Population, and GDP per capita data from the World Bank API</p>

  <div class="controls">
    <label class="control">
      <span>Color by</span>
      <select (change)="onMetricChange($event)">
        <option value="none" [selected]="colorMode === 'none'">None</option>
        <option value="income" [selected]="colorMode === 'income'">Income level</option>
        <option value="population" [selected]="colorMode === 'population'">Population</option>
        <option value="gdp" [selected]="colorMode === 'gdp'">GDP per capita</option>
      </select>
    </label>

    <label class="control">
      <span>Find country</span>
      <input
        type="search"
        list="country-list"
        placeholder="Type a country name…"
        (change)="onSearch($event)" />
      <datalist id="country-list">
        @for (option of countryOptions; track option.id) {
          <option [value]="option.name"></option>
        }
      </datalist>
    </label>

    <button type="button" class="ghost-btn" (click)="toggleDark()">
      {{ darkMode ? '☀ Light mode' : '🌙 Dark mode' }}
    </button>
  </div>
</div>

<div class="grid-container">
  <app-world-map
    [colorMode]="colorMode"
    [selectedCode]="selectedCode"
    (countrySelect)="onCountrySelected($event)"
    (optionsLoaded)="onOptionsLoaded($event)"></app-world-map>

  <app-country-panel
    [countries]="countries"
    [isLoading]="isLoadingData"
    [error]="dataError"
    (remove)="removeCountry($event)"
    (retry)="retry()"></app-country-panel>
</div>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="World map globe">
  <defs>
    <radialGradient id="ocean" cx="36%" cy="32%" r="80%">
      <stop offset="0%" stop-color="#5aa0ef"/>
      <stop offset="100%" stop-color="#0b4da2"/>
    </radialGradient>
    <clipPath id="globe">
      <circle cx="16" cy="16" r="14.5"/>
    </clipPath>
  </defs>

  <circle cx="16" cy="16" r="14.5" fill="url(#ocean)" stroke="#063b7a" stroke-width="1.4"/>

  <g clip-path="url(#globe)">
    <!-- stylized landmasses positioned like continents -->
    <g fill="#3fae5a">
      <path d="M9 6.5c2.2 0 4.2 1 4 3.2-.2 1.8-2.4 1.8-3.2 3-1 1.4-.6 3.4-2.8 3.4-2 0-3-2-2.2-3.8.7-1.6 2.4-1.8 2.2-3.6-.2-1.8 1.4-2.6 4-2.2z"/>
      <path d="M11.5 18.5c2-.8 3.2.4 3.2 2.4 0 2.4-1.2 4.6-3.2 4.4-1.8-.2-2-2.4-1.6-3.8.3-1.2.4-2.6 1.6-3z"/>
      <path d="M19 7c3.2-1 6.6.2 7 3.4.3 2.6-2.4 4.4-5 4.2-2.2-.2-2.8-2-2.4-3.6.3-1.2 1.8-1.4 1.8-2.4 0-.8-1.4-1-1.4-1.6z"/>
      <path d="M22.5 18.5c2 0 3.2 1 3.2 2.2s-1.8 2.2-3.4 2-2.2-1.2-2-2.4c.2-1 1-1.8 2.2-1.8z"/>
    </g>

    <!-- globe grid -->
    <g fill="none" stroke="#eaf4ff" stroke-opacity="0.45" stroke-width="0.8">
      <ellipse cx="16" cy="16" rx="5.2" ry="14.5"/>
      <ellipse cx="16" cy="16" rx="10.6" ry="14.5"/>
      <line x1="1.5" y1="16" x2="30.5" y2="16"/>
      <line x1="3.4" y1="9" x2="28.6" y2="9"/>
      <line x1="3.4" y1="23" x2="28.6" y2="23"/>
    </g>
  </g>

  <!-- soft sphere highlight -->
  <ellipse cx="11" cy="10" rx="4.6" ry="3" fill="#ffffff" opacity="0.16"/>
</svg>

[build]
  command = "npm run build"
  publish = "dist/world-map/browser"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback: unknown paths serve index.html. Netlify serves real files first,
# so JS/CSS/assets are unaffected.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers + Content-Security-Policy on every response.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), camera=(), microphone=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://api.worldbank.org; frame-ancestors 'none'; base-uri 'self'; object-src 'none'"

# Fingerprinted bundles are immutable for a given hash — cache them forever.
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# index.html must revalidate so new deploys are picked up immediately.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"

# The map SVG isn't fingerprinted; cache for a day with revalidation.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
